{% extends 'base.html' %}
{% block content %}
<section class="section admin-shell admin-shell--refined">
  <div class="container admin-layout admin-layout--refined">
    <aside class="admin-sidebar admin-sidebar--refined">
      <div class="admin-sidebar__intro">
        <span class="eyebrow">PAINEL PLAY4LAN</span>
        <h2>Central do admin</h2>
      </div>

      <nav class="admin-nav" aria-label="Navegação do painel">
        <a class="admin-nav__link {{ 'is-active' if request.endpoint == 'admin.dashboard' else '' }}" href="{{ url_for('admin.dashboard') }}">
          <i class="bi bi-speedometer2"></i>
          <span><strong>Resumo</strong></span>
        </a>
        <a class="admin-nav__link {{ 'is-active' if request.endpoint == 'admin.events' else '' }}" href="{{ url_for('admin.events') }}">
          <i class="bi bi-calendar2-week"></i>
          <span>
            <strong>Eventos</strong>
          </span>
        </a>
        <a class="admin-nav__link {{ 'is-active' if request.endpoint == 'admin.sales' else '' }}" href="{{ url_for('admin.sales') }}">
          <i class="bi bi-receipt-cutoff"></i>
          <span><strong>Vendas</strong></span>
        </a>
        <a class="admin-nav__link {{ 'is-active' if request.endpoint == 'admin.apis' else '' }}" href="{{ url_for('admin.apis') }}">
          <i class="bi bi-plug"></i>
          <span><strong>Integrações</strong></span>
        </a>
        <a class="admin-nav__link {{ 'is-active' if request.endpoint == 'admin.account' else '' }}" href="{{ url_for('admin.account') }}">
          <i class="bi bi-person-gear"></i>
          <span><strong>Conta</strong></span>
        </a>
      </nav>

      <div class="admin-sidebar__footer">
        <a class="btn btn-ghost full" href="{{ url_for('site.home') }}"><i class="bi bi-house-door"></i> Ver site</a>
      </div>
    </aside>

    <div class="admin-main admin-main--refined">
      {% block admin_content %}{% endblock %}
    </div>
  </div>
</section>
{% endblock %}
