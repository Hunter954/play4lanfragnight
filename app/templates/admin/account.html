{% extends 'admin/base_admin.html' %}
{% block title %}Minha conta{% endblock %}
{% block admin_content %}
<div class="section-header">
  <div>
    <span class="eyebrow">Administrador</span>
    <h1>Minha conta</h1>
    <p>Atualize seu e-mail e sua senha de acesso.</p>
  </div>
</div>

<div class="cards-2 single-column">
  <div class="glass-card">
    <form method="post" class="admin-form">
      <label>Nome</label>
      <input type="text" value="{{ current_user.name }}" disabled>

      <label>Novo e-mail</label>
      <input type="email" name="email" value="{{ current_user.email }}" required>

      <label>Nova senha</label>
      <input type="password" name="password" placeholder="Deixe em branco para manter a atual">

      <label>Confirmar nova senha</label>
      <input type="password" name="password_confirm" placeholder="Repita a nova senha">

      <button class="btn" type="submit">Salvar alterações</button>
    </form>
  </div>
</div>
{% endblock %}
